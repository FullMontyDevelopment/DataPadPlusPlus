name: Generated API Project Full Matrix

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  full-matrix:
    name: Rust and .NET datastore client exports
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux desktop build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            pkg-config \
            wget

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './apps/desktop/src-tauri -> target'

      - name: Install workspace dependencies
        run: npm ci

      - name: Start and seed MongoDB and DynamoDB Local fixtures
        run: |
          npm run fixtures:up:profile -- cloud-contract
          npm run fixtures:seed:all

      - name: Compile all 24 generated projects and run available local fixtures
        run: npm run api-export:validate:full-live

      - name: Stop local fixtures
        if: always()
        run: npm run fixtures:down
